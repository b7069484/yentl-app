<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Yentl Tab Listener options</title>
    <style>
      body {
        color: #1a1a1f;
        font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 560px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }

      input {
        border: 1px solid #d8cfb4;
        border-radius: 8px;
        box-sizing: border-box;
        font: inherit;
        padding: 10px 12px;
        width: 100%;
      }

      button {
        align-items: center;
        background: #2563eb;
        border: 0;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 600;
        margin-top: 12px;
        padding: 9px 14px;
      }

      p {
        color: #5b6075;
      }

      #status {
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Yentl Tab Listener</h1>
      <p>Choose the Yentl app origin that receives live tab transcripts. Use a preview or local origin only for internal testing.</p>
      <label for="app-origin">Yentl app origin</label>
      <input id="app-origin" type="url" placeholder="https://yentl.it" />
      <button id="save" type="button">Save</button>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>

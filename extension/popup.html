<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Listen with Yentl</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        box-sizing: border-box;
        width: 286px;
        margin: 0;
        padding: 16px;
        background: #fffdf8;
        color: #1d1d24;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 32px;
        line-height: 1;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #f0a327;
      }

      .copy {
        margin: 0 0 14px;
        color: #62677d;
        font-size: 14px;
        line-height: 1.45;
      }

      button {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 10px;
        background: #19191f;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          background 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(25, 25, 31, 0.22);
      }

      button:active {
        transform: translateY(1px) scale(0.99);
      }

      button:disabled {
        cursor: progress;
        opacity: 0.72;
        transform: none;
      }

      #status {
        min-height: 18px;
        margin: 10px 0 0;
        color: #62677d;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="brand" aria-hidden="true">yentl<span class="dot"></span></div>
    <p class="copy">Open Yentl beside this page and listen to the tab audio.</p>
    <button id="start" type="button">Start live analysis</button>
    <p id="status" role="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
